          - code [ref=e233]: "#include <bits/stdc++.h> using namespace std; /* * C++ 实现说明： * 当前页面暂时复用同题思路的参考实现。 * 如果这里的代码源自 C 版本，请根据需要替换为更贴近现代 C++ 风格的写法。 */ #include <stdio.h> /** * 冒泡排序 * 每一轮把最大值冒泡到末尾 */ void bubbleSort(int arr[], int n) { for (int i = 0; i < n - 1; i++) { int swapped = 0; // 优化标记 for (int j = 0; j < n - 1 - i; j++) { // 相邻元素比较，逆序则交换 if (arr[j] > arr[j + 1]) { int tmp = arr[j]; arr[j] = arr[j + 1]; arr[j + 1] = tmp; swapped = 1; } } // 本轮无交换，数组已有序 if (!swapped) break; } } int main() { int arr[] = {38, 27, 43, 3, 9, 82, 10}; int n = 7; bubbleSort(arr, n); for (int i = 0; i < n; i++) printf(\"%d \", arr[i]); return 0; }"